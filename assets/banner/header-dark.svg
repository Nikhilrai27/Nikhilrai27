<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(76,201,240,0)"/>
      <stop offset="30%" stop-color="rgba(76,201,240,0.6)"/>
      <stop offset="70%" stop-color="rgba(139,92,246,0.6)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(76,201,240,0.08)"/>
      <stop offset="100%" stop-color="rgba(76,201,240,0)"/>
    </radialGradient>
  </defs>
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="200" fill="url(#glow)" opacity="0.5"/>
  <line x1="100" y1="80" x2="800" y2="80" stroke="url(#line)" stroke-width="0.5" opacity="0.4"/>
  <text x="450" y="95" text-anchor="middle" fill="url(#title)" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="700" letter-spacing="-0.03">Nikhil Rai</text>
  <text x="450" y="130" text-anchor="middle" fill="#A1A1AA" font-family="system-ui,-apple-system,sans-serif" font-size="18" letter-spacing="0.3">AI Engineer · Agentic Systems · ResearchOS</text>
  <line x1="100" y1="150" x2="800" y2="150" stroke="url(#line)" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="40" r="1.5" fill="#4CC9F0" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="160" r="1.5" fill="#8B5CF6" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="35" r="1" fill="#22D3EE" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
