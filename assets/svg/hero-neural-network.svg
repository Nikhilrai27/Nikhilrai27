<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="sphereGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(76,201,240,0.08)" />
      <stop offset="50%" stop-color="rgba(76,201,240,0.04)" />
      <stop offset="100%" stop-color="rgba(76,201,240,0)" />
    </radialGradient>
    <radialGradient id="sphereInner" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
      <stop offset="40%" stop-color="rgba(255,255,255,0.04)" />
      <stop offset="80%" stop-color="rgba(255,255,255,0.02)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <radialGradient id="purpleGlow" cx="0%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.06)" />
      <stop offset="100%" stop-color="rgba(139,92,246,0)" />
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(76,201,240,0.15)" />
      <stop offset="50%" stop-color="rgba(139,92,246,0.10)" />
      <stop offset="100%" stop-color="rgba(34,211,238,0.15)" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="200" r="180" fill="url(#sphereGlow)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="140" fill="url(#purpleGlow)" opacity="0.4"/>

  <!-- Neural network connecting lines -->
  <g opacity="0.25">
    <line x1="80" y1="120" x2="160" y2="180" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="80" y1="120" x2="140" y2="280" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="80" y1="120" x2="260" y2="140" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="160" y1="180" x2="140" y2="280" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="160" y1="180" x2="260" y2="140" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="160" y1="180" x2="300" y2="260" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="140" y1="280" x2="300" y2="260" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="260" y1="140" x2="300" y2="260" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="260" y1="140" x2="320" y2="160" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="80" y1="120" x2="100" y2="80" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="100" y1="80" x2="260" y2="140" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="320" y1="160" x2="300" y2="260" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="140" y1="280" x2="120" y2="320" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="120" y1="320" x2="300" y2="260" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="160" y1="180" x2="200" y2="200" stroke="url(#lineGrad)" stroke-width="0.8"/>
  </g>

  <!-- Glass sphere -->
  <circle cx="200" cy="200" r="80" fill="url(#sphereInner)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="80" fill="url(#sphereInner)" opacity="0.5"/>

  <!-- Sphere highlight arc -->
  <path d="M 145 160 Q 200 120 255 160" stroke="rgba(255,255,255,0.10)" stroke-width="1" fill="none"/>
  <path d="M 140 175 Q 200 130 260 175" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" fill="none"/>

  <!-- Nodes -->
  <!-- Node with pulse -->
  <circle cx="80" cy="120" r="4" fill="rgba(76,201,240,0.6)" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="160" cy="180" r="3" fill="rgba(34,211,238,0.5)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="140" cy="280" r="3" fill="rgba(139,92,246,0.5)">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="260" cy="140" r="3.5" fill="rgba(76,201,240,0.5)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="300" cy="260" r="3" fill="rgba(34,211,238,0.4)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="320" cy="160" r="2.5" fill="rgba(139,92,246,0.4)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="80" r="2" fill="rgba(76,201,240,0.3)">
    <animate attributeName="opacity" values="0.4;0.2;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="120" cy="320" r="2" fill="rgba(139,92,246,0.3)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Center node -->
  <circle cx="200" cy="200" r="5" fill="rgba(76,201,240,0.4)" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbital ring -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5" stroke-dasharray="4 8">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="30s" repeatCount="indefinite"/>
  </circle>

  <circle cx="200" cy="200" r="115" fill="none" stroke="rgba(76,201,240,0.03)" stroke-width="0.5" stroke-dasharray="2 12">
    <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="40s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles -->
  <circle cx="60" cy="60" r="1" fill="rgba(255,255,255,0.15)">
    <animate attributeName="cy" values="60;50;60" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="80" r="1" fill="rgba(255,255,255,0.1)">
    <animate attributeName="cy" values="80;70;80" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.03;0.1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="300" r="1.2" fill="rgba(255,255,255,0.12)">
    <animate attributeName="cy" values="300;290;300" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="320" r="0.8" fill="rgba(255,255,255,0.08)">
    <animate attributeName="cy" values="320;310;320" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Data flow particles along neural paths -->
  <circle cx="80" cy="120" r="1.5" fill="rgba(76,201,240,0.6)" filter="url(#glow)">
    <animate attributeName="cx" values="80;160;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;180;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="260" cy="140" r="1.5" fill="rgba(34,211,238,0.5)">
    <animate attributeName="cx" values="260;300;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;260;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
