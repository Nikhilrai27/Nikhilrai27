<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(76,201,240,0.1)" />
      <stop offset="50%" stop-color="rgba(139,92,246,0.08)" />
      <stop offset="100%" stop-color="rgba(34,211,238,0.1)" />
    </linearGradient>
  </defs>
  <g opacity="0.3">
    <!-- Grid-like connecting lines -->
    <line x1="50" y1="50" x2="150" y2="50" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="50" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="150" y2="150" stroke="url(#connGrad)" stroke-width="0.5"/>
    <line x1="150" y1="50" x2="250" y2="50" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="150" y1="50" x2="150" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="150" y1="50" x2="250" y2="150" stroke="url(#connGrad)" stroke-width="0.5"/>
    <line x1="50" y1="150" x2="150" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="50" y1="150" x2="50" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="50" y1="150" x2="150" y2="250" stroke="url(#connGrad)" stroke-width="0.5"/>
    <line x1="150" y1="150" x2="250" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="150" y1="150" x2="150" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <line x1="150" y1="150" x2="250" y2="250" stroke="url(#connGrad)" stroke-width="0.5"/>
    <line x1="250" y1="150" x2="250" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <!-- Connection nodes -->
    <circle cx="50" cy="50" r="2" fill="rgba(76,201,240,0.2)"/>
    <circle cx="150" cy="50" r="2" fill="rgba(139,92,246,0.2)"/>
    <circle cx="250" cy="50" r="2" fill="rgba(34,211,238,0.2)"/>
    <circle cx="50" cy="150" r="2" fill="rgba(139,92,246,0.2)"/>
    <circle cx="150" cy="150" r="3" fill="rgba(255,255,255,0.08)" stroke="rgba(76,201,240,0.15)" stroke-width="0.5">
      <animate attributeName="r" values="2;4;2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="150" r="2" fill="rgba(34,211,238,0.2)"/>
    <circle cx="50" cy="250" r="2" fill="rgba(34,211,238,0.2)"/>
    <circle cx="150" cy="250" r="2" fill="rgba(76,201,240,0.2)"/>
    <circle cx="250" cy="250" r="2" fill="rgba(139,92,246,0.2)"/>
  </g>
</svg>
