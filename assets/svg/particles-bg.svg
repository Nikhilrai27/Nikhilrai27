<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <!-- Floating background particles for the README background -->
  <g opacity="0.3">
    <circle cx="120" cy="30" r="1" fill="rgba(255,255,255,0.2)">
      <animate attributeName="cy" values="30;20;30" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="80" r="0.8" fill="rgba(255,255,255,0.15)">
      <animate attributeName="cy" values="80;65;80" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="20" r="1.2" fill="rgba(255,255,255,0.1)">
      <animate attributeName="cy" values="20;10;20" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="100" r="0.7" fill="rgba(255,255,255,0.12)">
      <animate attributeName="cy" values="100;90;100" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="40" r="1" fill="rgba(255,255,255,0.08)">
      <animate attributeName="cy" values="40;30;40" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="70" r="0.9" fill="rgba(255,255,255,0.1)">
      <animate attributeName="cy" values="70;55;70" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="140" r="0.6" fill="rgba(76,201,240,0.08)">
      <animate attributeName="cy" values="140;130;140" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="160" r="0.8" fill="rgba(139,92,246,0.06)">
      <animate attributeName="cy" values="160;145;160" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="130" r="0.7" fill="rgba(34,211,238,0.07)">
      <animate attributeName="cy" values="130;120;130" dur="13s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
